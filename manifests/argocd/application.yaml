apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fabletics-agentgateway-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jamesilse-solo/field-poc-fabletics-manifests.git
    targetRevision: main
    path: manifests/argocd
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
